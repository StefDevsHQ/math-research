name: Monotone NAE-3SAT main verification

on:
  push:
    branches:
      - main
    paths:
      - "tools/monotone-nae-3sat/**"
      - "problems/p-vs-np/investigations/monotone-nae-3sat/**"
      - "scripts/**"
      - ".githooks/**"
      - ".github/workflows/monotone-nae-vs01.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monotone-nae-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: Fast compatibility (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fast repository gate
        run: sh scripts/check.sh fast

  full:
    name: Full research gate (3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Full repository gate
        run: sh scripts/check.sh full
